name: Build and Deploy to Azure

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Login to Azure Container Registry
      uses: azure/docker-login@v2
      with:
        login-server: questdoregistry.azurecr.io
        username: ${{ secrets.ACR_USERNAME }}
        password: ${{ secrets.ACR_PASSWORD }}

    - name: Build and push images
      run: |
        docker build ./backend -t questdoregistry.azurecr.io/questdo-backend:latest
        docker push questdoregistry.azurecr.io/questdo-backend:latest
        docker build ./frontend -t questdoregistry.azurecr.io/questdo-frontend:latest
        docker push questdoregistry.azurecr.io/questdo-frontend:latest

    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v3
      with:
        app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
        images: questdoregistry.azurecr.io/questdo-frontend:latest