name: Build and Deploy Frontend and Backend to Azure

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Login to Azure Container Registry
      uses: azure/docker-login@v2
      with:
        login-server: questdoregistry.azurecr.io
        username: ${{ secrets.ACR_USERNAME }}
        password: ${{ secrets.ACR_PASSWORD }}

    # === BUILD AND DEPLOY BACKEND ===
    - name: Build and push backend image
      run: |
        docker build ./backend -t questdoregistry.azurecr.io/questdo-backend:latest
        docker push questdoregistry.azurecr.io/questdo-backend:latest

    - name: Deploy Backend to Azure Web App
      uses: azure/webapps-deploy@v3
      with:
        app-name: questdo-backend-https
        images: questdoregistry.azurecr.io/questdo-backend:latest

    # === BUILD AND DEPLOY FRONTEND ===
    - name: Build and push frontend image
      run: |
        docker build ./frontend -t questdoregistry.azurecr.io/questdo-frontend:latest
        docker push questdoregistry.azurecr.io/questdo-frontend:latest

    - name: Deploy Frontend to Azure Web App
      uses: azure/webapps-deploy@v3
      with:
        app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
        images: questdoregistry.azurecr.io/questdo-frontend:latest