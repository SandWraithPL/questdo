name: Build and Deploy Frontend and Backend to Azure

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # === BACKEND JOB ===
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to Azure Container Registry
        uses: azure/docker-login@v2
        with:
          login-server: questdoregistry.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push backend image
        run: |
          docker pull questdoregistry.azurecr.io/questdo-backend:latest || true
          docker build --cache-from questdoregistry.azurecr.io/questdo-backend:latest -t questdoregistry.azurecr.io/questdo-backend:latest ./backend
          docker push questdoregistry.azurecr.io/questdo-backend:latest

      - name: Deploy Backend to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: questdo-backend-https
          images: questdoregistry.azurecr.io/questdo-backend:latest

  # === FRONTEND JOB ===
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to Azure Container Registry
        uses: azure/docker-login@v2
        with:
          login-server: questdoregistry.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push frontend image
        run: |
          docker pull questdoregistry.azurecr.io/questdo-frontend:latest || true
          docker build --cache-from questdoregistry.azurecr.io/questdo-frontend:latest -t questdoregistry.azurecr.io/questdo-frontend:latest ./frontend
          docker push questdoregistry.azurecr.io/questdo-frontend:latest

      - name: Deploy Frontend to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          images: questdoregistry.azurecr.io/questdo-frontend:latest